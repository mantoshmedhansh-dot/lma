name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'packages/api-python/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # Check if required secrets are available
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    outputs:
      has_render_key: ${{ steps.check.outputs.has_render_key }}
      has_staging_id: ${{ steps.check.outputs.has_staging_id }}
      has_production_id: ${{ steps.check.outputs.has_production_id }}
    steps:
      - name: Check secrets availability
        id: check
        run: |
          echo "has_render_key=${{ secrets.RENDER_API_KEY != '' }}" >> $GITHUB_OUTPUT
          echo "has_staging_id=${{ secrets.RENDER_STAGING_SERVICE_ID != '' }}" >> $GITHUB_OUTPUT
          echo "has_production_id=${{ secrets.RENDER_PRODUCTION_SERVICE_ID != '' }}" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      (github.event_name == 'push' || github.event.inputs.environment == 'staging') &&
      needs.preflight.outputs.has_render_key == 'true' &&
      needs.preflight.outputs.has_staging_id == 'true'
    environment:
      name: staging
      url: ${{ vars.API_STAGING_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render (Staging)
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true

      - name: Health check
        if: vars.API_STAGING_URL != ''
        run: |
          sleep 30
          curl -f ${{ vars.API_STAGING_URL }}/health || exit 1

      - name: Notify success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "API deployed to staging successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*API Staging Deployment Successful*\n\nCommit: `${{ github.sha }}`\nBranch: `${{ github.ref_name }}`\nURL: ${{ vars.API_STAGING_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [preflight, deploy-staging]
    if: |
      github.event.inputs.environment == 'production' &&
      needs.preflight.outputs.has_render_key == 'true' &&
      needs.preflight.outputs.has_production_id == 'true'
    environment:
      name: production
      url: ${{ vars.API_PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render (Production)
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true

      - name: Health check
        if: vars.API_PRODUCTION_URL != ''
        run: |
          sleep 30
          curl -f ${{ vars.API_PRODUCTION_URL }}/health || exit 1

      - name: Notify success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "API deployed to production successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*API Production Deployment Successful*\n\nCommit: `${{ github.sha }}`\nBranch: `${{ github.ref_name }}`\nURL: ${{ vars.API_PRODUCTION_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Create release tag
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const sha = context.sha.substring(0, 7);
            const tagName = `api-${date}-${sha}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: context.sha
            });
