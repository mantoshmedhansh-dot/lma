name: Production Alerts

on:
  schedule:
    # Run every 6 hours (Render free tier spins down between checks anyway)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write

env:
  API_PRODUCTION_URL: ${{ vars.API_PRODUCTION_URL }}

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check API Health
        id: api-health
        run: |
          # First request wakes up Render free tier, retry after 30s if it fails
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 ${{ env.API_PRODUCTION_URL }}/health || echo "000")
          if [ "$response" != "200" ]; then
            echo "First attempt got $response, waiting 30s for cold start..."
            sleep 30
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ env.API_PRODUCTION_URL }}/health || echo "000")
          fi
          echo "status_code=$response" >> $GITHUB_OUTPUT
          if [ "$response" != "200" ]; then
            echo "unhealthy=true" >> $GITHUB_OUTPUT
          else
            echo "unhealthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Health Details
        if: steps.api-health.outputs.unhealthy == 'true'
        id: health-details
        run: |
          details=$(curl -s --max-time 10 ${{ env.API_PRODUCTION_URL }}/health || echo '{"error": "Failed to fetch"}')
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$details" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Send Slack Alert
        if: steps.api-health.outputs.unhealthy == 'true' && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Production API Health Check Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Production API Alert"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\nUnhealthy"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*HTTP Code:*\n${{ steps.api-health.outputs.status_code }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*URL:* ${{ env.API_PRODUCTION_URL }}/health"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Create GitHub Issue
        if: steps.api-health.outputs.unhealthy == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Production API Health Check Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Alert Details',
              '',
              `- **Status Code**: ${{ steps.api-health.outputs.status_code }}`,
              `- **URL**: \`${{ env.API_PRODUCTION_URL }}/health\``,
              `- **Time**: ${new Date().toISOString()}`,
              '',
              '## Health Check Response',
              '```json',
              `${{ steps.health-details.outputs.details || 'Unable to fetch details' }}`,
              '```',
              '',
              '## Actions',
              '- [ ] Check Render dashboard for service status',
              '- [ ] Check Supabase for database issues',
              '- [ ] Verify environment variables',
              '',
              '---',
              '*This issue was automatically created by the health check workflow.*'
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'production-alert'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['production-alert', 'urgent']
              });
            }
        continue-on-error: true

      - name: Fail if unhealthy
        if: steps.api-health.outputs.unhealthy == 'true'
        run: exit 1
